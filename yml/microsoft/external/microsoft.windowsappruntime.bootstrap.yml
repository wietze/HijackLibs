    Condition: 'kwpswnsserver.exe (a renamed Microsoft-signed binary) loads microsoft.windowsappruntime.bootstrap.dll via the MddBootstrapInitialize2 export. Observed in Mustang Panda (LOTUSLITE) campaigns targeting India and South Korea using lure filenames matching geopolitical themes.'
